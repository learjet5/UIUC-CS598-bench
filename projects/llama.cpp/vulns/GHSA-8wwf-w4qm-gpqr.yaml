id: GHSA-8wwf-w4qm-gpqr
title: "Buffer overflow in vocabulary loading via malicious GGUF model"
project: llama.cpp

type: heap-buffer-overflow
cwe: CWE-122
cwe_secondary: [CWE-20]

severity: HIGH
cvss_v3_score: 8.1

affected_versions:
  - "< b4455"
fixed_versions:
  - "b4455"
affected_component: "src/llama.cpp"
vulnerable_function: "llama_vocab::impl::token_to_piece"
trigger: >
  Load a GGUF model file whose vocabulary section contains token strings with
  crafted lengths that exceed the expected maximum.  The token_to_piece()
  function copies token bytes into a fixed-size output buffer without checking
  the token string length, causing a heap buffer overflow.
impact: >
  Heap buffer overflow during model loading;
  potential arbitrary code execution triggered by opening a malicious .gguf file.

fix_commit: "https://github.com/ggml-org/llama.cpp/commit/3cfbbdb44e08fd19429fed6cc85b982a91f0efd5"
vulnerable_commit: "80709b70a2f87c13ccaf1480b799393109996789"
# Note: yaml originally listed `b4455` as the fix tag, but that tag doesn't
# exist (llama.cpp tag list jumps b4404 -> b4406 -> b4409 -> ...). Real fix
# is `3cfbbdb4` (Merge commit from fork, "vocab : prevent integer overflow
# during load", 2025-06-13) which adds a GGML_ABORT in token_to_piece's
# _try_copy when size >= INT32_MAX. Verified via git show — matches yaml's
# vulnerable_function (llama_vocab::impl::token_to_piece) exactly.
github_advisory: GHSA-8wwf-w4qm-gpqr
poc_available: false
poc_link: "https://github.com/ggml-org/llama.cpp/security/advisories/GHSA-8wwf-w4qm-gpqr"
poc_notes: >
  GitHub Security Advisory (GHSA-8wwf-w4qm-gpqr / CVE-2025-49847) describes
  the integer truncation bug in token_to_piece() but contains no embedded PoC
  code and no external exploit link.  Advisory only describes the trigger
  condition (GGUF model with token_text.size() > INT32_MAX); no ready-made
  malicious file or exploit script has been published.

description: >
  When llama.cpp loads a GGUF model file, it reads vocabulary token strings
  and passes them through token_to_piece() for normalisation.  The function
  uses a fixed-size destination buffer without validating the source token
  length, so a token string longer than the buffer size causes a heap-buffer-
  overflow.  An attacker who can convince a user to open a malicious .gguf
  file (e.g., downloaded from a public model repository) can trigger this
  vulnerability during model loading.

references:
