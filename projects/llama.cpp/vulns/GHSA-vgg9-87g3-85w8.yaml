id: GHSA-vgg9-87g3-85w8
title: "Integer overflow in GGUF parser leads to heap OOB read/write"
project: llama.cpp

type: integer-overflow
cwe: CWE-190
cwe_secondary: [CWE-122, CWE-125]

severity: HIGH
cvss_v3_score: 8.1

affected_versions:
  - "< b4057"
fixed_versions:
  - "b4057"
affected_component: "ggml/src/gguf.cpp"
vulnerable_function: "gguf_init_from_file"
trigger: >
  Supply a crafted .gguf model file whose tensor metadata specifies tensor
  dimensions whose product overflows size_t when summed via ctx->size +=
  ggml_nbytes(t).  The ctx->size variable wraps to a much smaller value than
  required, causing a subsequent heap allocation to be undersized.  Writing
  tensor data then overflows the allocation.
impact: >
  Heap out-of-bounds read and write during model loading;
  potential arbitrary code execution when loading a malicious .gguf file.

fix_commit: "https://github.com/ggml-org/llama.cpp/commit/26a48ad699d50b6268900062661bd22f3e792579"
vulnerable_commit: "ffd59e7d18a76459d5c31ba97073c7c9d73cb752"
